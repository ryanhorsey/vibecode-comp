<!doctype html>
<html>
  <head>
    <style>
      :root {
        --cat-body: #2c3e50;
        --cat-accent: #e74c3c;
        --cat-iris: #3498db;
        --cat-pupil: #000000;
        --cat-paws: #1a252f;
        --widget-glow: rgba(255, 255, 255, 0.6);
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        height: 100vh;
        padding-bottom: 10px;
        box-sizing: border-box;
      }

      /* Added Border & Glow to Menu and Bubble */
      #speech-bubble,
      #expanded-menu {
        background: white;
        border: 2px solid #ccc;
        border-radius: 15px;
        box-shadow:
          0 0 15px var(--widget-glow),
          0 4px 8px rgba(0, 0, 0, 0.3);
        z-index: 10;
      }

      #speech-bubble {
        padding: 10px;
        margin-bottom: 15px;
        width: 85%;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        opacity: 0;
        transition: opacity 0.3s;
        font-weight: bold;
      }

      #expanded-menu {
        display: none;
        padding: 15px;
        width: 85%;
        margin-bottom: 15px;
      }

      #task-container {
        max-height: 120px;
        overflow-y: auto;
        margin-bottom: 10px;
      }
      .task-item {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
        font-size: 14px;
      }
      .completed {
        text-decoration: line-through;
        color: #888;
      }

      .add-task-row {
        display: flex;
        gap: 5px;
        margin-bottom: 10px;
      }
      #new-task-input {
        flex: 1;
        padding: 4px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      #add-btn {
        padding: 4px 8px;
        background: #2ecc71;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      .action-btn {
        cursor: pointer;
        color: #0066cc;
        text-decoration: underline;
        font-size: 14px;
      }
      hr {
        border: 0;
        border-top: 1px solid #eee;
        margin: 10px 0;
      }

      /* --- ANIMATIONS --- */

      /* 1. Celebrate (Jump) */
      @keyframes celebrate {
        0%,
        100% {
          transform: scale(1) translateY(0);
        }
        50% {
          transform: scale(1.1) translateY(-20px);
        }
      }
      .anim-celebrate {
        animation: celebrate 0.4s ease-in-out 2;
      }

      /* 2. Petting (Purr/Squish) */
      @keyframes purr {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05, 0.95);
        }
      }
      .anim-petting {
        animation: purr 0.8s ease-in-out infinite;
      }
      .anim-petting .cat-pupil {
        transform: scaleX(0.2);
      }

      /* 3. Feeding (Vibrate/Bounce) */
      @keyframes excited {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-2px) translateY(-5px);
        }
        75% {
          transform: translateX(2px) translateY(-5px);
        }
      }
      .anim-feeding {
        animation: excited 0.2s infinite;
      }

      #treat {
        position: absolute;
        font-size: 50px;
        top: -60px;
        left: 125px;
        opacity: 0;
        z-index: 5;
      }
      @keyframes dropTreat {
        0% {
          top: -100px;
          opacity: 1;
        }
        100% {
          top: 60px;
          opacity: 0;
        }
      }
      .dropping {
        animation: dropTreat 1s forwards;
      }

      /* Cat Style with Outline */
      #cat-container {
        cursor: pointer;
        width: 300px;
        height: 300px;
        position: relative;
        filter: drop-shadow(
          0 0 8px var(--widget-glow)
        ); /* Border effect for the cat */
      }
      .cat-body,
      .cat-tail {
        fill: var(--cat-body);
        stroke: var(--cat-body);
        transition: all 0.3s;
      }
      .cat-tail {
        fill: transparent;
        stroke-width: 6;
        stroke-linecap: round;
      }
      .cat-accent {
        fill: var(--cat-accent);
        transition: fill 0.3s;
      }
      .cat-paws {
        fill: var(--cat-paws);
        transition: fill 0.3s;
      }
      .cat-iris {
        fill: var(--cat-iris);
        transition: fill 0.3s;
        transform-origin: center;
      }
      .cat-pupil {
        fill: var(--cat-pupil);
        transform-origin: center;
        transition: transform 0.2s;
      }
    </style>
  </head>
  <body>
    <div id="expanded-menu">
      <h3>📝 Tasks</h3>
      <div class="add-task-row">
        <input type="text" id="new-task-input" placeholder="New task..." />
        <button id="add-btn" onclick="addTask()">Add</button>
      </div>
      <div id="task-container"><div id="task-list"></div></div>
      <hr />
      <h3>Interact</h3>
      <div style="display: flex; gap: 15px">
        <span class="action-btn" onclick="petCat()">Pet</span>
        <span class="action-btn" onclick="feedCat()">Feed</span>
      </div>
      <hr />
      <h3>Customize</h3>
      <div class="color-settings-row">
        <label
          >Body: <input type="color" id="color-body" value="#2c3e50"
        /></label>
        <label
          >Iris: <input type="color" id="color-irises" value="#3498db"
        /></label>
        <label
          >Paws: <input type="color" id="color-paws" value="#1a252f"
        /></label>
      </div>
    </div>

    <div id="speech-bubble">Meow!</div>

    <div id="cat-container" onclick="toggleMenu(event)">
      <div id="treat">🐟</div>
      <svg id="the-cat" viewBox="0 0 100 100" width="100%" height="100%">
        <g id="whole-cat">
          <path
            class="cat-tail"
            d="M 65 78 C 80 95, 100 95, 90 85 C 85 80, 75 85, 80 90"
          />
          <ellipse class="cat-body" cx="50" cy="70" rx="24" ry="20" />
          <ellipse class="cat-paws" cx="30" cy="88" rx="8" ry="4.5" />
          <ellipse class="cat-paws" cx="70" cy="88" rx="8" ry="4.5" />
          <circle class="cat-body" cx="50" cy="45" r="20" />
          <polygon class="cat-body" points="35,35 32,15 48,30" />
          <polygon class="cat-body" points="65,35 68,15 52,30" />
          <polygon class="cat-accent" points="36,32 35,21 44,29" />
          <polygon class="cat-accent" points="64,32 65,21 56,29" />
          <g class="cat-eye-group">
            <circle class="cat-iris" cx="42" cy="42" r="4.5" />
            <circle class="cat-pupil" cx="42" cy="42" r="1.8" />
            <circle class="cat-iris" cx="58" cy="42" r="4.5" />
            <circle class="cat-pupil" cx="58" cy="42" r="1.8" />
          </g>
          <polygon class="cat-accent" points="48,49 52,49 50,52" />
          <ellipse class="cat-paws" cx="42" cy="85" rx="6" ry="8" />
          <ellipse class="cat-paws" cx="58" cy="85" rx="6" ry="8" />
        </g>
      </svg>
    </div>

    <script>
      const taskListElement = document.getElementById("task-list");
      const input = document.getElementById("new-task-input");
      const catSVG = document.getElementById("the-cat");
      const treat = document.getElementById("treat");
      const speech = document.getElementById("speech-bubble");
      const menu = document.getElementById("expanded-menu");

      let tasks = [{ text: "Finish coding project", completed: false }];

      function renderTasks() {
        taskListElement.innerHTML = "";
        tasks.forEach((task, index) => {
          const item = document.createElement("div");
          item.className = "task-item";
          item.innerHTML = `
                <input type="checkbox" ${task.completed ? "checked" : ""} onchange="toggleTask(${index})">
                <span class="${task.completed ? "completed" : ""}">${task.text}</span>
            `;
          taskListElement.appendChild(item);
        });
      }

      function addTask() {
        if (input.value.trim() !== "") {
          tasks.push({ text: input.value, completed: false });
          input.value = "";
          renderTasks();
        }
      }

      function toggleTask(index) {
        tasks[index].completed = !tasks[index].completed;
        renderTasks();
        if (tasks[index].completed) {
          celebrate();
        }
      }

      function celebrate() {
        catSpeak("GREAT JOB! 🎉", 3000);
        catSVG.classList.add("anim-celebrate");
        setTimeout(() => catSVG.classList.remove("anim-celebrate"), 1500);
      }

      function petCat() {
        menu.style.display = "none";
        catSpeak("Purrrrrr... ❤️", 3000);
        catSVG.classList.add("anim-petting");
        setTimeout(() => catSVG.classList.remove("anim-petting"), 3000);
      }

      function feedCat() {
        menu.style.display = "none";
        catSpeak("Delicious! 🐟", 3000);
        treat.classList.add("dropping");
        setTimeout(() => catSVG.classList.add("anim-feeding"), 800);
        setTimeout(() => {
          catSVG.classList.remove("anim-feeding");
          treat.classList.remove("dropping");
        }, 2500);
      }

      function catSpeak(msg, dur = 5000) {
        speech.innerText = msg;
        speech.style.opacity = 1;
        setTimeout(() => (speech.style.opacity = 0), dur);
      }

      function toggleMenu(e) {
        if (e.target.closest("#expanded-menu")) return;
        menu.style.display = menu.style.display === "block" ? "none" : "block";
      }

      document.getElementById("color-body").oninput = (e) =>
        document.documentElement.style.setProperty(
          "--cat-body",
          e.target.value,
        );
      document.getElementById("color-irises").oninput = (e) =>
        document.documentElement.style.setProperty(
          "--cat-iris",
          e.target.value,
        );
      document.getElementById("color-paws").oninput = (e) =>
        document.documentElement.style.setProperty(
          "--cat-paws",
          e.target.value,
        );

      renderTasks();
    </script>
  </body>
</html>
